<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Premium Edition</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-card">
        <div class="progress-dots">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
        </div>
        
        <div id="step1" class="step active">
            <h2>Basic Info</h2>
            <p class="subtitle">Let's start with your identity.</p>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Alex Rivera">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="alex@example.com">
            </div>
            <button class="primary-btn" style="width: 100%;" onclick="MultiStepForm.nextStep(2)">Continue</button>
        </div>

        <div id="step2" class="step">
            <h2>Academic Details</h2>
            <p class="subtitle">Tell us about your studies.</p>
            <div class="input-group">
                <label>Major</label>
                <select id="major">
                    <option>Computer Science</option>
                    <option>Data Science</option>
                    <option>Cyber Security</option>
                </select>
            </div>
            <div class="input-group">
                <label>Graduation Year</label>
                <input type="number" id="gradYear" placeholder="2025">
            </div>
            <div class="btn-group">
                <button class="secondary-btn" onclick="MultiStepForm.nextStep(1)">Back</button>
                <button class="primary-btn" onclick="MultiStepForm.nextStep(3)">Next</button>
            </div>
        </div>

        <div id="step3" class="step">
            <h2>All Done!</h2>
            <p class="subtitle">Review your details and submit.</p>
            <div style="background: #f1f5f9; padding: 20px; border-radius: 16px; margin-bottom: 32px; font-size: 0.9rem;">
                <p><strong>Name:</strong> <span id="reviewName"></span></p>
                <p><strong>Email:</strong> <span id="reviewEmail"></span></p>
            </div>
            <div class="btn-group">
                <button class="secondary-btn" onclick="MultiStepForm.nextStep(2)">Back</button>
                <button class="primary-btn" onclick="MultiStepForm.submit()">Submit</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="mongodb.js"></script>
</body>
</html>
