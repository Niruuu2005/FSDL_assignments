<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher | Premium Edition</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="container">
        <h1>Dark Mode?</h1>
        <p>Switch between light and dark themes. Your preference will be saved automatically for your next visit.</p>
        
        <div class="theme-toggle">
            <div class="circle" id="indicator">☀️</div>
        </div>

        <div class="demo-content">
            <h3 style="color: var(--accent)">Interactive UI</h3>
            <p style="font-size: 0.9rem; margin-top: 8px;">Notice how the background, cards, and accents all transition smoothly.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
